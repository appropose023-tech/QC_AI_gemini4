workflows:
  build_app:
    name: Universal Flutter Project Builder
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:

      # ----------------------------------------------------
      # 1. Scaffold a Full Flutter Project (creates pubspec.yaml)
      # ----------------------------------------------------
      - name: Scaffold Flutter Multiplatform Project
        script: |
          echo ">>> Backing up your repo files..."
          mkdir -p /tmp/repo_files
          rsync -av ./ /tmp/repo_files \
            --exclude ".git" \
            --exclude "build" \
            --exclude ".dart_tool"

          echo ">>> Cleaning workspace..."
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} \;

          echo ">>> Creating full Flutter project with all platforms..."
          flutter create --project-name pcb_app --platforms=android,ios,web,linux,macos,windows .

      # ----------------------------------------------------
      # 2. Inject Your LIB Folder
      # ----------------------------------------------------
      - name: Restore Source Files
        script: |
          echo ">>> Restoring lib folder from repository..."
          rm -rf lib
          cp -R /tmp/repo_files/lib ./lib

      # ----------------------------------------------------
      # 3. Apply ANDROID Overrides
      # ----------------------------------------------------
      - name: Apply Android Overrides
        script: |
          echo ">>> Applying Android override files..."
          if [ -d "/tmp/repo_files/android_overrides" ]; then
            rsync -av /tmp/repo_files/android_overrides/ ./android/app/
          else
            echo "No android_overrides folder found!"
          fi

          mkdir -p android/app/src/main/res/xml
          if [ -f "/tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml" ]; then
            cp /tmp/repo_files/android_overrides/app/src/main/res/xml/network_security_config.xml \
               android/app/src/main/res/xml/network_security_config.xml
          fi

      # ----------------------------------------------------
      # 4. Add Required Dependencies (pubspec.yaml auto-created)
      # ----------------------------------------------------
      - name: Add Required Packages
        script: |
          echo ">>> Adding required packages..."
          flutter pub add http
          flutter pub add camera

          echo ">>> Running pub get..."
          flutter pub get

      # ----------------------------------------------------
      # 5. Build Android APK
      # ----------------------------------------------------
      - name: Build Android APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
