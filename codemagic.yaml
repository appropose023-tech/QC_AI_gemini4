workflows:
  build_app:
    name: PCB App Builder
    max_build_duration: 60
    scripts:
      # Step 1 — backup repo code
      - name: Backup repo code (lib + overrides)
        script: |
          echo "Backing up repo code..."
          mkdir -p repo_backup/lib
          mkdir -p repo_backup/android_overrides

          # Copy lib
          if [ -d "./lib" ]; then
            cp -R ./lib/* repo_backup/lib/ 2>/dev/null || true
          fi

          # Copy android_overrides
          if [ -d "./android_overrides" ]; then
            cp -R ./android_overrides/* repo_backup/android_overrides/ 2>/dev/null || true
          fi

          echo "--- Repo backup contents ---"
          ls -R repo_backup

      # Step 2 — verify main.dart exists
      - name: Verify Flutter entrypoint
        script: |
          if [ ! -f repo_backup/lib/main.dart ]; then
            echo "❌ ERROR: repo_backup/lib/main.dart not found."
            echo "Your repository must contain lib/main.dart before building."
            exit 1
          fi
          echo "✓ main.dart found."

      # Step 3 — create new Flutter project
      - name: Create new Flutter project
        script: |
          flutter create pcb_app
          cd pcb_app

          # Remove default lib folder
          rm -rf lib/*
          cd ..

      # Step 4 — restore backed up lib + android overrides
      - name: Restore code into pcb_app
        script: |
          echo "Restoring lib..."
          cp -R repo_backup/lib/* pcb_app/lib/ 2>/dev/null || true

          echo "Restoring android overrides..."
          mkdir -p pcb_app/android/app/src/main/
          cp -R repo_backup/android_overrides/* pcb_app/android/app/src/main/ 2>/dev/null || true

          echo "--- Final project structure ---"
          ls -R pcb_app

      # Step 5 — Build the release APK
      - name: Build Release APK
        script: |
          cd pcb_app
          flutter build apk --release

    artifacts:
      - pcb_app/build/app/outputs/flutter-apk/*.apk
