workflows:
  build_pcb_inspector:
    name: Build PCB Inspector
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        APP_NAME: "pcb_inspector"

    scripts:
      - name: Create Flutter project
        script: |
          flutter create $APP_NAME
          cd $APP_NAME

      - name: Replace default main.dart with your custom code
        script: |
          cd $APP_NAME/lib
          rm -f main.dart

          cat > main.dart << "EOF"
import 'dart:io';
import 'package:flutter/material.dart';
import 'package:camera/camera.dart';
import 'package:path_provider/path_provider.dart';
import 'api_service.dart';

void main() async {
  WidgetsFlutterBinding.ensureInitialized();
  final cameras = await availableCameras();
  final firstCamera = cameras.first;

  runApp(MaterialApp(
    home: CaptureScreen(camera: firstCamera),
  ));
}

class CaptureScreen extends StatefulWidget {
  final CameraDescription camera;
  CaptureScreen({required this.camera});

  @override
  _CaptureScreenState createState() => _CaptureScreenState();
}

class _CaptureScreenState extends State<CaptureScreen> {
  CameraController? controller;
  bool processing = false;
  XFile? processedImage;

  @override
  void initState() {
    super.initState();
    controller = CameraController(widget.camera, ResolutionPreset.max);
    controller!.initialize().then((_) {
      if (!mounted) return;
      setState(() {});
    });
  }

  Future<void> captureAndUpload() async {
    if (controller == null || !controller!.value.isInitialized) return;

    setState(() => processing = true);

    final image = await controller!.takePicture();
    final annotated = await ApiService.processImage(File(image.path));

    setState(() {
      processedImage = XFile(annotated.path);
      processing = false;
    });
  }

  @override
  Widget build(BuildContext context) {
    if (controller == null || !controller!.value.isInitialized) {
      return Scaffold(body: Center(child: CircularProgressIndicator()));
    }

    return Scaffold(
      appBar: AppBar(title: Text("PCB Inspector")),
      body: Column(
        children: [
          Expanded(child: CameraPreview(controller!)),
          if (processedImage != null)
            Image.file(File(processedImage!.path), height: 200),
          SizedBox(height: 10),
          ElevatedButton(
            onPressed: processing ? null : captureAndUpload,
            child: processing ? Text("Processing...") : Text("Capture & Inspect"),
          ),
        ],
      ),
    );
  }
}
EOF

      - name: Add API service file
        script: |
          cd $APP_NAME/lib
          cat > api_service.dart << "EOF"
import 'dart:io';
import 'package:http/http.dart' as http;
import 'package:path_provider/path_provider.dart';

class ApiService {
  static Future<File> processImage(File file) async {
    final url = Uri.parse("YOUR_SERVER_URL/process");

    var req = http.MultipartRequest("POST", url);
    req.files.add(await http.MultipartFile.fromPath("file", file.path));

    final res = await req.send();
    final bytes = await res.stream.toBytes();

    final dir = await getTemporaryDirectory();
    final annotated = File("${dir.path}/annotated.png");
    await annotated.writeAsBytes(bytes);

    return annotated;
  }
}
EOF

      - name: Build dependencies
        script: |
          cd $APP_NAME
          flutter pub add camera
          flutter pub add path_provider
          flutter pub add http

      - name: Build APK
        script: |
          cd $APP_NAME
          flutter build apk --release

      - name: Show APK paths
        script: |
          echo "APK files generated:"
          find $APP_NAME/build/app/outputs -name "*.apk" -print

    artifacts:
      - $APP_NAME/build/app/outputs/flutter-apk/**/*.apk
