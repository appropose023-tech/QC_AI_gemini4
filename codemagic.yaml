workflows:
  build-flutter-apk:
    name: Build PCB Inspector APK
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        APP_NAME: "pcb_inspector_project"

    scripts:
      # 1) Backup your repo's lib directory
      - name: Backup source lib folder
        script: |
          mkdir lib_backup
          cp -R lib/* lib_backup/

      # 2) Create fresh Flutter project
      - name: Create fresh Flutter project
        script: |
          flutter create $APP_NAME

      # 3) Replace Flutter lib folder with your backup
      - name: Inject your lib folder
        script: |
          cd $APP_NAME
          rm -rf lib
          mkdir lib
          cp -R ../lib_backup/* lib/

      # 4) Add dependencies
      - name: Add dependencies
        script: |
          cd $APP_NAME
          flutter pub add camera
          flutter pub add http
          flutter pub add permission_handler

      # 5) Get packages
      - name: Flutter pub get
        script: |
          cd $APP_NAME
          flutter pub get

      # 6) Build APK
      - name: Build APK
        script: |
          cd $APP_NAME
          flutter build apk --release

    artifacts:
      - $APP_NAME/build/app/outputs/flutter-apk/app-release.apk
